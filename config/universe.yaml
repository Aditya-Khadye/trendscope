# Trendscope universe — tickers grouped by purpose.
# Edit freely. Changes take effect on the next ingest run; existing rows
# in the prices table are unaffected.

groups:
  mega_cap:
    description: "Largest US equities by market cap"
    tickers:
      - AAPL
      - MSFT
      - NVDA
      - GOOGL
      - AMZN
      - META
      - TSLA

  indices_etfs:
    description: "Broad market and sector ETFs (also serve as benchmarks)"
    tickers:
      - SPY    # S&P 500
      - QQQ    # Nasdaq 100
      - IWM    # Russell 2000
      - XLF    # Financials
      - XLK    # Technology
      - XLE    # Energy
      - XLV    # Health Care
      - XLY    # Consumer Discretionary

  holdings:
    description: "Personal positions — placeholder, replace with actual holdings"
    tickers:
      - TSLA

# Benchmark (sector-ETF) mapping moved to dbt/seeds/sector_etf_map.csv —
# the transform layer is its source of truth so it participates in SQL
# joins, tests, and lineage. Tickers absent from the seed fall back to SPY.
