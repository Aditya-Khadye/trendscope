# Non-secret configuration. API keys live in .env, never here.
# Path values are relative to the repo root.

paths:
  duckdb: "data/trendscope.duckdb"
  digests: "digests/"
  universe_yaml: "config/universe.yaml"

ingest:
  default_start: "2020-01-01"
  yfinance:
    interval: "1d"
    auto_adjust: false   # we keep raw OHLC and adj_close as separate columns
    actions: true        # include splits / dividends columns
    timeout_seconds: 30
  retries:
    max_attempts: 3
    backoff_seconds: 2

# Signal parameters live in dbt/dbt_project.yml `vars` — dbt owns all
# transformations. This file configures only the Python EL + digest layers.

# Digest parameters: which tickers count as "interesting today".
digest:
  filters:
    zscore_threshold: 1.5           # flag |zscore| >= this
    momentum_rank_extreme: 0.9      # flag rank >= this or <= (1 - this)
    vol_percentile_threshold: 0.9   # flag vol regime above this percentile
    rel_return_threshold: 0.05      # flag |relative_return_21d| >= this
    max_tickers_per_digest: 15
  llm:
    model: "claude-sonnet-4-6"
    max_tokens: 4096
    temperature: 0.4
  news:
    headlines_per_ticker: 5

logging:
  level: "INFO"
  format: "console"   # "console" for dev, "json" for prod / CI

display:
  timezone: "America/New_York"   # storage is UTC; display flips to ET
